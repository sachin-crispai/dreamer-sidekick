site_name: dreamer-sidekick
site_url: https://sachin-crispai.github.io/dreamer-sidekick/
repo_url: https://github.com/sachin-crispai/dreamer-sidekick
repo_name: sachin-crispai/dreamer-sidekick

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest

docs_dir: docs

nav:
  - Home: index.md
  - Tools:
    - Web Scraping: tools/web-scraping.md
    - AI / ML: tools/ai-ml.md
    - APIs & Integrations: tools/apis-integrations.md
    - Data Processing: tools/data-processing.md
    - Search & Research: tools/search-research.md
    - Document Processing: tools/document-processing.md
    - Code Analysis: tools/code-analysis.md
    - Visualization: tools/visualization.md
    - DevOps & Infra: tools/devops-infra.md
